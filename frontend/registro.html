<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax - Registrarse</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background:
                radial-gradient(ellipse 60% 50% at 30% 20%, rgba(212,168,83,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 70% 80%, rgba(110,140,173,0.04) 0%, transparent 50%),
                var(--bg-deep);
        }
        
        .auth-container {
            width: 100%;
            max-width: 440px;
            animation: fadeInUp 0.6s ease-out;
        }
        
        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }
        
        .auth-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(212,168,83,0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }
        
        .auth-logo h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: -0.05em;
        }
        
        .auth-logo p {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-weight: 300;
            font-family: 'Outfit', sans-serif;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(10, 10, 20, 0.5);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: 'Outfit', sans-serif;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim), 0 0 16px rgba(212,168,83,0.06);
        }
        
        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent), #c49540);
            border: none;
            border-radius: var(--radius-sm);
            color: #000;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212,168,83,0.2), 0 0 12px rgba(212,168,83,0.1);
        }
        
        .btn-primary::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -75%;
            width: 50%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-20deg);
            transition: left 0.55s ease;
            pointer-events: none;
        }
        .btn-primary:hover::after { left: 125%; }
        
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-family: 'Outfit', sans-serif;
        }
        
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: rgba(229, 77, 95, 0.08);
            border: 1px solid rgba(229, 77, 95, 0.25);
            color: var(--danger);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
            font-family: 'Outfit', sans-serif;
        }
        
        .error-message.show {
            display: block;
            animation: fadeInUp 0.3s ease-out;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0,0,0,0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>CineMax</h1>
                <p>Crear Cuenta</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" class="form-control" 
                           placeholder="Juan Pérez" required autocomplete="name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" 
                           placeholder="tu@email.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" class="form-control" 
                           placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
                </div>
                
                <div class="form-group">
                    <label for="confirmar_contrasena">Confirmar Contraseña</label>
                    <input type="password" id="confirmar_contrasena" name="confirmar_contrasena" class="form-control" 
                           placeholder="Repite tu contraseña" required autocomplete="new-password">
                </div>
                
                <button type="submit" class="btn-primary" id="submitBtn">
                    Crear Cuenta
                </button>
            </form>
            
            <div class="auth-footer">
                ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a>
            </div>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-family: 'Outfit', sans-serif;">
                    ← Volver al inicio
                </a>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.classList.remove('show');
            
            const nombre = document.getElementById('nombre').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const contrasena = document.getElementById('contrasena').value;
            const confirmarContrasena = document.getElementById('confirmar_contrasena').value;
            
            if (contrasena !== confirmarContrasena) {
                errorMessage.textContent = 'Las contraseñas no coinciden';
                errorMessage.classList.add('show');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span>Creando cuenta...';
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, email, contrasena })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Error al crear cuenta');
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify({
                    id: data.user_id,
                    nombre: data.nombre,
                    rol: data.rol
                }));
                
                window.location.href = data.rol === 'admin' ? 'admin.html' : 'index.html';
                
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Crear Cuenta';
            }
        });
    </script>
</body>
</html>
