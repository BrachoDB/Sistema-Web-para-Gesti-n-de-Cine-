<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax - Cartelera</title>
    <meta name="description" content="CineMax — Vive la magia del cine con nuestra cartelera premium e interactiva.">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── Hero Section ── */
        .hero {
            position: relative;
            padding: clamp(4rem, 10vw, 7rem) 0 clamp(2.5rem, 5vw, 4rem);
            text-align: center;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 45% at 50% 15%, rgba(212,168,83,0.07) 0%, transparent 65%),
                radial-gradient(ellipse 40% 50% at 80% 85%, rgba(110,140,173,0.05) 0%, transparent 55%);
            pointer-events: none;
        }
        .hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4.2rem);
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 25%, var(--accent) 75%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.1;
        }
        .hero p {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--text-muted);
            max-width: 480px;
            margin: 0 auto;
            font-weight: 300;
            line-height: 1.6;
        }

        /* ── Footer ── */
        .site-footer {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-dim);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
            margin-top: 2rem;
        }
        .site-footer a { color: var(--accent); }

        /* ── Skeleton placeholders ── */
        .skeleton-card {
            border-radius: var(--radius-lg);
            min-height: 320px;
        }
        .skeleton-card:first-child {
            grid-column: span 2;
            grid-row: span 2;
            min-height: 500px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">CineMax</a>
        <button class="nav-toggle" onclick="document.body.classList.toggle('nav-open')" aria-label="Menú">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="navAuth">
            <!-- Navigation will be updated by updateNavbarAuth() -->
        </div>
    </nav>

    <div class="container">
        <header class="hero">
            <h1>Cartelera Disponible</h1>
            <p>Vive la magia del cine interactivo y premium con nuestra selección.</p>
        </header>

        <div id="moviesGrid" class="movies-grid">
            <!-- Skeleton loading placeholders (bento layout) -->
            <div class="glass-panel skeleton skeleton-card"></div>
            <div class="glass-panel skeleton skeleton-card"></div>
            <div class="glass-panel skeleton skeleton-card"></div>
            <div class="glass-panel skeleton skeleton-card"></div>
        </div>
    </div>

    <footer class="site-footer">
        <p>&copy; 2026 <a href="index.html">CineMax</a> — La mejor experiencia cinematográfica.</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Actualizar navbar según estado de sesión
            updateNavbarAuth();
            
            try {
                const funciones = await apiCall('/funciones');
                const grid = document.getElementById('moviesGrid');
                grid.innerHTML = '';
                
                if (funciones.length === 0) {
                    grid.innerHTML = '<div class="text-center text-muted glass-panel" style="grid-column:1/-1; padding: 3rem;">No hay funciones programadas actualmente.</div>';
                    return;
                }

                // Group by Movie
                const moviesMap = {};
                funciones.forEach(f => {
                    if(!moviesMap[f.pelicula_id]) {
                        moviesMap[f.pelicula_id] = {
                            id: f.pelicula_id,
                            titulo: f.titulo_pelicula,
                            imagen_url: f.imagen_url || 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=800&q=80',
                            descripcion: f.descripcion || '',
                            funciones: []
                        };
                    }
                    moviesMap[f.pelicula_id].funciones.push(f);
                });

                Object.values(moviesMap).forEach(movie => {
                    const card = document.createElement('div');
                    card.className = 'glass-panel movie-card';
                    
                    const ahora = new Date();
                    let hasActiveFunctions = false;

                    const functionsHtml = movie.funciones.map(f => {
                        const inicio = new Date(`${f.fecha}T${f.hora}`);
                        const fin = new Date(inicio.getTime() + (f.duracion || 120) * 60000);
                        const isFinalizada = ahora > fin;
                        const isCancelada = f.estado === 'cancelada';
                        const isDisabled = isFinalizada || isCancelada;
                        
                        if (!isDisabled && f.estado === 'disponible') {
                            hasActiveFunctions = true;
                        }

                        let statusText = '';
                        if (isCancelada) statusText = '<br>(Cancelada)';
                        else if (isFinalizada) statusText = '<br>(Finalizada)';
                        else statusText = `<br><span style="font-weight:normal; font-size:0.75rem;">$${Number(f.precio)}</span>`;

                        return `
                            <button class="btn ${isDisabled ? '' : 'btn-primary'}" 
                                    style="margin-right:0.5rem; margin-bottom:0.5rem; font-size: 0.85rem; ${isDisabled ? 'background:rgba(255,255,255,0.05); color:var(--text-muted); cursor:not-allowed; border:1px solid rgba(255,255,255,0.1);' : ''}" 
                                    ${isDisabled ? 'disabled' : `onclick="window.location.href='compra.html?funcion_id=${f.id}'"`}>
                                ${formatDate(f.fecha)} - ${f.hora.substring(0,5)} 
                                ${statusText}
                            </button>
                        `;
                    }).join('');

                    // Build synopsis text
                    const sinopsisHtml = movie.descripcion 
                        ? `<p class="movie-synopsis">${movie.descripcion}</p>` 
                        : '';

                    card.innerHTML = `
                        <img src="${movie.imagen_url}" alt="${movie.titulo}" class="movie-img">
                        <div class="movie-info">
                            <h3 class="movie-title">${movie.titulo}</h3>
                            ${sinopsisHtml}
                            <div class="movie-meta">
                                <span class="badge" style="color: ${hasActiveFunctions ? 'var(--success)' : 'var(--text-muted)'}; border: 1px solid ${hasActiveFunctions ? 'var(--success)' : 'rgba(255,255,255,0.1)'};">
                                    ${hasActiveFunctions ? '● Disponible' : 'Sin Funciones'}
                                </span>
                            </div>
                            <div style="margin-top:auto;">
                                <p class="text-muted" style="font-size: 0.85rem; margin-bottom: 0.4rem;">Horarios:</p>
                                <div style="display:flex; flex-wrap:wrap;">
                                    ${functionsHtml}
                                </div>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                document.getElementById('moviesGrid').innerHTML = '<div class="text-center text-danger glass-panel" style="grid-column:1/-1; padding: 2rem;">Error de conexión con el servidor. Por favor, asegúrese de que el backend esté en ejecución.</div>';
            }
        });
    </script>
</body>
</html>
