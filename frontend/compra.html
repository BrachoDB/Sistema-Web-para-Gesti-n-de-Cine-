<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selección de Asientos - CineMax</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── Purchase page enhancements ── */
        .purchase-header {
            text-align: center;
            margin: 2rem 0;
            animation: fadeInUp 0.5s ease-out;
        }
        .purchase-header h2 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.04em;
        }

        /* Seat legend styles */
        .seat-legend {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 3rem;
            flex-wrap: wrap;
            font-family: 'Outfit', sans-serif;
        }
        .seat-legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Purchase summary bar */
        .purchase-bar {
            margin-top: 3rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            font-family: 'Outfit', sans-serif;
        }
        .purchase-bar h3 { margin-bottom: 0; font-family: 'Syne', sans-serif; }

        /* Success section */
        .success-section {
            margin-top: 4rem;
            padding: 4rem 2rem;
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
        }
        .success-icon {
            font-size: 4.5rem;
            display: block;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 24px rgba(62, 201, 127, 0.2));
        }
        .ticket-code-box {
            background: rgba(10, 10, 20, 0.8);
            border: 1px solid var(--accent);
            padding: 1.5rem 3rem;
            border-radius: var(--radius-md);
            margin: 2rem auto;
            display: inline-flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 0 30px rgba(212, 168, 83, 0.08);
            border-radius: var(--radius-sm);
        }
        .ticket-code-box h1 {
            margin: 0;
            letter-spacing: 4px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            color: var(--accent);
            font-size: 2rem;
        }
        .copy-btn {
            background: var(--accent);
            border: none;
            color: #000;
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            transition: all 0.25s;
            font-family: 'Outfit', sans-serif;
        }
        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 168, 83, 0.3);
        }

        @media (max-width: 480px) {
            .purchase-bar { flex-direction: column; text-align: center; }
            .ticket-code-box { flex-direction: column; padding: 1.5rem; gap: 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">CineMax</a>
        <button class="nav-toggle" onclick="document.body.classList.toggle('nav-open')" aria-label="Menú">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="navAuth"></div>
    </nav>

    <div class="container">
        <div id="loadingOverlay" class="text-center" style="margin-top: 5rem;">
            <div class="skeleton" style="width: 200px; height: 24px; margin: 0 auto 1rem; border-radius: 6px;"></div>
            <p class="text-muted" style="font-family: 'Outfit', sans-serif;">Preparando la sala...</p>
        </div>

        <div id="mapContainer" class="glass-panel seat-map-container hidden" style="animation: fadeInUp 0.5s ease-out;">
            <div class="purchase-header">
                <h2>Selecciona tus Asientos</h2>
            </div>
            
            <div class="screen-area">PANTALLA</div>
            
            <div id="seatGrid" class="seat-grid"></div>

            <div class="seat-legend">
                <div class="seat-legend-item">
                    <div class="seat" style="cursor:default; transform:none; border-color: rgba(255,255,255,0.1);"></div> <span>Disponible</span>
                </div>
                <div class="seat-legend-item">
                    <div class="seat selected" style="cursor:default; transform:none; box-shadow:none;"></div> <span>Seleccionado</span>
                </div>
                <div class="seat-legend-item">
                    <div class="seat ocupado" style="cursor:default; transform:none;"></div> <span>Ocupado</span>
                </div>
                <div class="seat-legend-item">
                    <div class="seat mantenimiento" style="cursor:default; transform:none;"></div> <span>Mantenimiento</span>
                </div>
            </div>
            
            <div class="purchase-bar">
                <div>
                    <h3>Total: <span id="totalPrice" class="text-primary">$0</span></h3>
                    <p class="text-muted" style="margin-top: 0.5rem; font-size: 0.9rem;">Asientos seleccionados: <span id="selectedCount">0</span></p>
                </div>
                <button id="btnPagar" class="btn btn-success" style="font-size: 1.1rem; padding: 1rem 3rem;" disabled>Confirmar Compra</button>
            </div>
        </div>
        
        <div id="ticketSuccess" class="glass-panel success-section hidden">
            <span class="success-icon">✨</span>
            <h2 class="text-success" style="font-size: 2.5rem; margin-bottom: 1rem; font-family: 'Syne', sans-serif;">¡Reserva Confirmada!</h2>
            <p style="font-size: 1.1rem; font-family: 'Outfit', sans-serif;" class="text-muted">Presenta este código en la entrada del cine.</p>
            <div class="ticket-code-box">
                <h1 id="ticketCode"></h1>
                <button onclick="copyTicketCode()" class="copy-btn">
                    Copiado Rápido
                </button>
            </div>
            <br>
            <a href="index.html" class="btn btn-primary" style="margin-top: 1rem;">Volver a la cartelera</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const funcionId = urlParams.get('funcion_id');
        let selectedSeats = [];
        let pricePerSeat = 0;
        let currentUser = null;
        let esAdmin = false;
        
        if (!funcionId) window.location.href = 'index.html';

        document.addEventListener('DOMContentLoaded', async () => {
            updateNavbarAuth();
            currentUser = getCurrentUser();
            esAdmin = currentUser && currentUser.rol === 'admin';
            
            try {
                let funcion = null;
                const endpoint = esAdmin ? '/funciones/all' : '/funciones';
                const data = await apiCall(endpoint);
                funcion = data.find(f => f.id == funcionId);

                if (!funcion || funcion.estado === 'cancelada') {
                    alert('Función no disponible.');
                    return window.location.href = 'index.html';
                }
                
                pricePerSeat = Number(funcion.precio);
                const asientos = await apiCall(`/funciones/${funcionId}/asientos`);
                
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('mapContainer').classList.remove('hidden');

                if (esAdmin) {
                    const notice = document.createElement('div');
                    notice.style.cssText = 'background: rgba(212,168,83,0.08); border: 1px solid var(--accent-dim); border-radius: 12px; padding: 1rem; margin-bottom: 2rem; text-align: center; color: var(--accent); font-family: "Outfit", sans-serif; font-size: 0.9rem;';
                    notice.innerHTML = '<strong>Modo Vista (Admin)</strong> — No puedes realizar compras reales.';
                    document.getElementById('mapContainer').prepend(notice);
                    document.getElementById('btnPagar').style.display = 'none';
                }

                const grid = document.getElementById('seatGrid');
                const rows = {};
                asientos.forEach(a => { if(!rows[a.fila]) rows[a.fila] = []; rows[a.fila].push(a); });

                Object.keys(rows).sort().forEach(fila => {
                    const label = document.createElement('div');
                    label.className = 'seat-row-label';
                    label.innerText = fila;
                    grid.appendChild(label);
                    
                    rows[fila].sort((a,b) => a.columna - b.columna).forEach(asiento => {
                        const div = document.createElement('div');
                        div.className = 'seat';
                        if (asiento.estado_funcion === 'mantenimiento') div.classList.add('mantenimiento');
                        else if (asiento.estado_funcion === 'ocupado') div.classList.add('ocupado');
                        else {
                            if (!esAdmin) div.onclick = () => {
                                if (!isAuthenticated()) { alert('Inicia sesión para comprar'); return; }
                                if(div.classList.toggle('selected')) selectedSeats.push(asiento.id);
                                else selectedSeats = selectedSeats.filter(id => id !== asiento.id);
                                updateTotal();
                            };
                        }
                        grid.appendChild(div);
                    });
                });

            } catch (error) { console.error(error); alert('Error al cargar sala.'); }
        });

        function updateTotal() {
            document.getElementById('selectedCount').innerText = selectedSeats.length;
            document.getElementById('totalPrice').innerText = '$' + (selectedSeats.length * pricePerSeat).toFixed(2);
            document.getElementById('btnPagar').disabled = selectedSeats.length === 0;
        }

        document.getElementById('btnPagar').addEventListener('click', async () => {
            const btn = document.getElementById('btnPagar');
            btn.disabled = true; btn.innerText = 'Procesando...';
            try {
                const res = await apiCall('/tiquetes', 'POST', { funcion_id: funcionId, asientos: selectedSeats, usuario_id: currentUser?.id });
                document.getElementById('mapContainer').classList.add('hidden');
                document.getElementById('ticketSuccess').classList.remove('hidden');
                document.getElementById('ticketCode').innerText = res.tiquete.codigo;
            } catch(e) { alert(e.message); btn.disabled = false; btn.innerText = 'Confirmar Compra'; }
        });
        
        function copyTicketCode() {
            navigator.clipboard.writeText(document.getElementById('ticketCode').innerText);
            alert('Código copiado');
        }
    </script>
</body>
</html>
