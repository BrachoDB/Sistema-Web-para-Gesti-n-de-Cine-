<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax - Validación Tiquete</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        // Check admin quickly before loading everything
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!localStorage.getItem('token') || user.rol !== 'admin') {
            window.location.href = 'index.html';
        }
    </script>
    <style>
        .validation-wrapper {
            max-width: 560px;
            margin: 6rem auto;
            animation: fadeInUp 0.6s ease-out;
        }
        .validation-card {
            padding: 3.5rem;
            text-align: center;
        }
        .validation-card h2 {
            margin-bottom: 2rem;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .validation-card .form-control {
            text-transform: uppercase;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            height: 4rem;
        }
        .validation-result {
            margin-top: 2rem;
            font-size: 1.15rem;
            padding: 2rem;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            animation: fadeInUp 0.4s ease-out;
            font-family: 'Outfit', sans-serif;
        }

        /* QR Scanner Styles */
        #reader {
            width: 100%;
            margin-top: 1rem;
            border-radius: 12px;
            overflow: hidden;
            border: none !important;
        }
        #reader__dashboard_section_csr button {
            background: var(--accent) !important;
            color: #000 !important;
            border: none !important;
            padding: 0.6rem 1rem !important;
            border-radius: 4px !important;
            font-weight: 700 !important;
            cursor: pointer !important;
        }
        .scanner-btn {
            background: rgba(212, 168, 83, 0.1);
            border: 1px dashed var(--accent);
            color: var(--accent);
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        .scanner-btn:hover {
            background: rgba(212, 168, 83, 0.2);
        }
    </style>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">CineMax</a>
        <button class="nav-toggle" onclick="document.body.classList.toggle('nav-open')" aria-label="Menú">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="navAuth"></div>
    </nav>
    <div class="container">
        <div class="validation-wrapper">
            <div class="glass-panel validation-card">
                <h2>Verificar Tiquete</h2>
                <div class="form-group" style="text-align: left;">
                    <label style="font-family: 'Outfit', sans-serif;">Código del Tiquete:</label>
                    <input type="text" id="codigoInput" class="form-control" placeholder="X8Y1Z2A3" autofocus>
                </div>
                
                <button id="btnValidar" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 1.1rem; margin-top: 1.5rem;">Validar Entrada</button>
                
                <div style="margin: 1.5rem 0; display: flex; align-items: center; gap: 1rem;">
                    <hr style="flex:1; border-color: rgba(255,255,255,0.05);">
                    <span style="color:var(--text-muted); font-size: 0.8rem;">O USA LA CÁMARA</span>
                    <hr style="flex:1; border-color: rgba(255,255,255,0.05);">
                </div>

                <div id="scanner-controls">
                    <button id="startScanner" class="scanner-btn">
                        <span>📷</span> Iniciar Cámara / Escanear QR
                    </button>
                </div>
                <div id="reader" style="display: none;"></div>

                <div id="resultado" class="validation-result hidden"></div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateNavbarAuth();
            document.getElementById('codigoInput').focus();
        });
        
        // --- FUNCIÓN DE VALIDACIÓN ---
        async function realizarValidacion() {
            const codigo = document.getElementById('codigoInput').value.trim().toUpperCase();
            if(!codigo) return;
            
            const btn = document.getElementById('btnValidar');
            const originalText = btn.innerText;
            btn.innerText = 'Verificando...'; btn.disabled = true;

            try {
                const response = await apiCall('/tiquetes/validar', 'POST', { codigo });
                const resDiv = document.getElementById('resultado');
                resDiv.classList.remove('hidden', 'text-success', 'text-danger');
                resDiv.style.borderColor = 'transparent';
                
                if(response.estado === 'Válido') {
                    resDiv.innerHTML = '<h3 style="font-family:Syne; margin-bottom:0.5rem;">ACCESO CONCEDIDO</h3><p>Tiquete verificado y marcado como usado.</p>';
                    resDiv.style.backgroundColor = 'rgba(62, 201, 127, 0.08)';
                    resDiv.style.borderColor = 'rgba(62, 201, 127, 0.2)';
                    resDiv.className = 'validation-result text-success';
                    // Limpiar input para siguiente escaneo (pistola)
                    document.getElementById('codigoInput').value = '';
                    setTimeout(() => document.getElementById('codigoInput').focus(), 100);
                } else {
                    resDiv.innerHTML = `<h3 style="font-family:Syne; margin-bottom:0.5rem;">ACCESO DENEGADO</h3><p>${response.estado === 'Usado' ? 'Este tiquete ya fue utilizado.' : 'Código no encontrado.'}</p>`;
                    resDiv.style.backgroundColor = 'rgba(229, 77, 95, 0.08)';
                    resDiv.style.borderColor = 'rgba(229, 77, 95, 0.2)';
                    resDiv.className = 'validation-result text-danger';
                    document.getElementById('codigoInput').select();
                }
            } catch (e) { alert('Error: ' + e.message); }
            finally { btn.innerText = originalText; btn.disabled = false; }
        }

        // Click en botón
        document.getElementById('btnValidar').addEventListener('click', realizarValidacion);
        
        // Soporte para Pistola Lectora (Enter Key)
        document.getElementById('codigoInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                realizarValidacion();
            }
        });

        // --- MANEJO DE CÁMARA (QR) ---
        let html5QrCode = null;
        document.getElementById('startScanner').addEventListener('click', () => {
            const readerDiv = document.getElementById('reader');
            readerDiv.style.display = 'block';
            
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                (decodedText) => {
                    // Si detecta QR
                    document.getElementById('codigoInput').value = decodedText;
                    html5QrCode.stop().then(() => {
                        readerDiv.style.display = 'none';
                        realizarValidacion();
                    });
                },
                (errorMessage) => { /* ignore errors */ }
            ).catch(err => {
                alert("Error al iniciar cámara: " + err);
                readerDiv.style.display = 'none';
            });
        });
    </script>
</body>
</html>
