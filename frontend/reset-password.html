<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax - Nueva Contraseña</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background:
                radial-gradient(ellipse 60% 50% at 30% 20%, rgba(212,168,83,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 70% 80%, rgba(110,140,173,0.04) 0%, transparent 50%),
                var(--bg-deep);
        }
        
        .auth-container {
            width: 100%;
            max-width: 440px;
            animation: fadeInUp 0.6s ease-out;
        }
        
        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }
        
        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-logo h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        
        .status-message {
            padding: 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
            text-align: center;
        }
        
        .status-message.success {
            background: rgba(62, 201, 127, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            display: block;
        }
        
        .status-message.error {
            background: rgba(229, 77, 95, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            display: block;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0,0,0,0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>CineMax</h1>
                <p class="text-muted">Nueva Contraseña</p>
            </div>
            
            <div id="statusMessage" class="status-message"></div>
            
            <div id="formContainer">
                <form id="resetForm">
                    <div class="form-group">
                        <label for="password">Nueva Contraseña</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirmar Nueva Contraseña</label>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required minlength="6">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="submitBtn" style="width: 100%; margin-top: 0.5rem;">
                        Actualizar Contraseña
                    </button>
                </form>
            </div>
            
            <div id="loginLink" style="text-align: center; margin-top: 2rem; display: none;">
                <a href="login.html" class="btn btn-primary" style="width: 100%;">
                    Iniciar Sesión Ahora
                </a>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const status = document.getElementById('statusMessage');
        const btn = document.getElementById('submitBtn');
        
        if (!token) {
            status.textContent = 'Token de recuperación no válido o ausente.';
            status.classList.add('error');
            document.getElementById('formContainer').style.display = 'none';
        }
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (password !== confirm) {
                status.textContent = 'Las contraseñas no coinciden.';
                status.className = 'status-message error';
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>Actualizando...';
            status.className = 'status-message';
            
            try {
                const res = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    status.textContent = data.message;
                    status.classList.add('success');
                    document.getElementById('formContainer').style.display = 'none';
                    document.getElementById('loginLink').style.display = 'block';
                } else {
                    throw new Error(data.error || 'Error al restablecer contraseña');
                }
            } catch (err) {
                status.textContent = err.message;
                status.classList.add('error');
                btn.disabled = false;
                btn.textContent = 'Actualizar Contraseña';
            }
        });
    </script>
</body>
</html>
