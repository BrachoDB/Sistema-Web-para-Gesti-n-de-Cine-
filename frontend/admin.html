<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CineMax - BackOffice Admin</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .form-control { background: rgba(0,0,0,0.2) !important; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">CineMax Admin</a>
        <div class="nav-links">
            <a href="index.html">Ver Sitio</a>
        </div>
    </nav>

    <div class="container" style="margin-top: 2rem; padding-bottom: 4rem;">
        
        <div class="stats-grid" id="statsContainer">
            <div class="glass-panel stat-card text-center">
                <h3 class="text-muted" style="margin-bottom:0.5rem; font-weight: 500;">Ingresos Totales</h3>
                <div class="stat-value" id="valVentas">$0</div>
            </div>
            <div class="glass-panel stat-card text-center">
                <h3 class="text-muted" style="margin-bottom:0.5rem; font-weight: 500;">Funciones Programadas</h3>
                <div class="stat-value" id="valFunciones">0</div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem;">
            <!-- Peliculas Form -->
            <div class="glass-panel" style="padding: 2rem;">
                <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Registrar Película</h3>
                <form id="formPelicula">
                    <div class="form-group">
                        <label>Título de la Película</label>
                        <input type="text" id="p_titulo" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Sinopsis / Descripción</label>
                        <textarea id="p_desc" class="form-control" rows="3"></textarea>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                        <div class="form-group">
                            <label>Duración (minutos)</label>
                            <input type="number" id="p_duracion" class="form-control" required min="1">
                        </div>
                        <div class="form-group">
                            <label>Género</label>
                            <input type="text" id="p_genero" class="form-control" placeholder="Ej: Acción">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>URL de la Imagen (Póster)</label>
                        <input type="url" id="p_img" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Registrar Película</button>
                </form>
            </div>

            <!-- Funciones Form -->
            <div class="glass-panel" style="padding: 2rem;">
                <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Programar Función</h3>
                <form id="formFuncion">
                    <div class="form-group">
                        <label>Seleccionar Película</label>
                        <select id="f_peli" class="form-control" required>
                            <option value="">Cargando películas...</option>
                        </select>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                        <div class="form-group">
                            <label>Fecha</label>
                            <input type="date" id="f_fecha" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Hora</label>
                            <input type="time" id="f_hora" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Precio por Tiquete ($)</label>
                        <input type="number" step="0.01" id="f_precio" class="form-control" required min="0">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Publicar Función</button>
                </form>
            </div>
        </div>

        <div class="glass-panel" style="padding: 2rem; margin-top: 2rem;">
            <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Reporte de Ocupación por Función</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Película</th>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Ocupación (Sillas)</th>
                            <th>Estado de Sala</th>
                        </tr>
                    </thead>
                    <tbody id="tblOcupacion">
                        <tr><td colspan="5" class="text-center">Cargando datos del sistema...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            loadDashboard();
            loadPeliculasSelect();
        });

        async function loadDashboard() {
            try {
                const data = await apiCall('/admin/dashboard');
                document.getElementById('valVentas').innerText = '$' + data.total_ventas.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                document.getElementById('valFunciones').innerText = data.ocupacion.length;
                
                const tbody = document.getElementById('tblOcupacion');
                tbody.innerHTML = '';
                
                if(data.ocupacion.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No hay funciones programadas en el sistema.</td></tr>';
                }

                data.ocupacion.forEach(row => {
                    const ocupacionPct = Math.round((row.asientos_ocupados / row.capacidad_total) * 100);
                    const isFull = ocupacionPct === 100;
                    tbody.innerHTML += `
                        <tr>
                            <td><strong class="text-primary">${row.titulo}</strong></td>
                            <td>${formatDate(row.fecha).split(',')[0]}</td>
                            <td>${row.hora.substring(0,5)}</td>
                            <td style="min-width: 200px;">
                                <div style="display:flex; align-items:center; gap:10px;">
                                    <div style="flex-grow:1; background:rgba(255,255,255,0.1); height:10px; border-radius:5px; overflow:hidden;">
                                        <div style="width:${ocupacionPct}%; background:${isFull ? 'var(--danger)' : 'var(--primary)'}; height:100%; transition: width 0.5s;"></div>
                                    </div>
                                    <span style="font-size:0.85rem; font-weight:600;">${row.asientos_ocupados}/${row.capacidad_total}</span>
                                </div>
                            </td>
                            <td>
                                ${isFull ? '<span class="badge" style="background:var(--danger); border:1px solid var(--danger);">Agotada</span>' : 
                                  ocupacionPct > 80 ? '<span class="badge" style="background:var(--secondary); border:1px solid var(--secondary);">Alta Demanda</span>' :
                                  '<span class="badge" style="background:var(--success); border:1px solid var(--success);">Disponible</span>'}
                            </td>
                        </tr>
                    `;
                });
            } catch (e) {
                console.error(e);
            }
        }

        async function loadPeliculasSelect() {
            try {
                const peliculas = await apiCall('/peliculas');
                const select = document.getElementById('f_peli');
                select.innerHTML = '<option value="">-- Seleccione una película --</option>';
                peliculas.forEach(p => {
                    select.innerHTML += `<option value="${p.id}">${p.titulo}</option>`;
                });
            } catch (e) {
                console.error(e);
                document.getElementById('f_peli').innerHTML = '<option value="">Error al cargar películas</option>';
            }
        }

        document.getElementById('formPelicula').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = 'Guardando...';
            btn.disabled = true;

            const body = {
                titulo: document.getElementById('p_titulo').value,
                descripcion: document.getElementById('p_desc').value,
                duracion: document.getElementById('p_duracion').value,
                genero: document.getElementById('p_genero').value,
                imagen_url: document.getElementById('p_img').value || 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=800&q=80',
            };
            try {
                await apiCall('/peliculas', 'POST', body);
                alert('🎬 Película registrada con éxito en el catálogo');
                e.target.reset();
                loadPeliculasSelect(); // Reload the select
            } catch (err) {
                alert('Error al crear película: ' + err.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        document.getElementById('formFuncion').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = 'Creando Función...';
            btn.disabled = true;

            const body = {
                pelicula_id: document.getElementById('f_peli').value,
                fecha: document.getElementById('f_fecha').value,
                hora: document.getElementById('f_hora').value,
                precio: document.getElementById('f_precio').value,
            };
            try {
                await apiCall('/funciones', 'POST', body);
                alert('🗓️ Nueva función programada con éxito');
                e.target.reset();
                loadDashboard(); // Refresh occupancy data
            } catch (err) {
                alert('Error al programar función: ' + err.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
